# Deve coincidir com o projeto em `supabase link` (ver supabase/.temp/project-ref)
project_id = "eqqznfijpxckfqqttabm"

[functions.invite-athlete]
verify_jwt = false

[functions.notify-admin-new-user]
verify_jwt = false

[functions.public-ranking]
verify_jwt = false

[functions.ranking-snapshot]
verify_jwt = false

[functions.auth-send-email]
verify_jwt = false

# Descomente após: deploy da função auth-send-email, secret SEND_EMAIL_HOOK_SECRET (Auth → Hooks) e config push
# [auth.hook.send_email]
# enabled = true
# uri = "https://eqqznfijpxckfqqttabm.supabase.co/functions/v1/auth-send-email"
# secrets = "env(SEND_EMAIL_HOOK_SECRET)"

# ── Auth + e-mail (Resend SMTP) ─────────────────────────────────────────────
# Ajuste site_url / additional_redirect_urls ao domínio real da app (Vercel ou custom).
# Envio: Resend — defina RESEND_API_KEY no ambiente ao correr `npx supabase config push`.
# Remetente: use um domínio verificado no Resend; onboarding@resend.dev funciona para testes.
# Imagens nos templates: servidas em {SiteURL}/email/* (pasta public/email no deploy Vite).

[auth]
enabled = true
site_url = "https://fitblock-eta.vercel.app"
additional_redirect_urls = [
  "http://127.0.0.1:8080",
  "http://127.0.0.1:8080/reset-password",
  "http://localhost:8080",
  "http://localhost:8080/reset-password",
  "https://fitblock-eta.vercel.app",
  "https://fitblock-eta.vercel.app/reset-password",
]
jwt_expiry = 3600
enable_signup = true
enable_anonymous_sign_ins = false

[auth.rate_limit]
email_sent = 30
sms_sent = 30
anonymous_users = 30
token_refresh = 150
sign_in_sign_ups = 30
token_verifications = 30
web3 = 30

[auth.mfa]
max_enrolled_factors = 10

[auth.mfa.totp]
enroll_enabled = true
verify_enabled = true

[auth.email]
enable_signup = true
double_confirm_changes = true
enable_confirmations = true
secure_password_change = false
max_frequency = "1m"
otp_length = 8
otp_expiry = 3600

[auth.email.smtp]
enabled = true
host = "smtp.resend.com"
port = 465
user = "resend"
pass = "env(RESEND_API_KEY)"
admin_email = "onboarding@resend.dev"
sender_name = "FitBlock Training"

[auth.email.template.confirmation]
subject = "Bem-vindo à FitBlock — confirme a inscrição"
content_path = "./supabase/templates/confirmation.html"

[auth.email.template.recovery]
subject = "FitBlock — redefinir sua senha"
content_path = "./supabase/templates/recovery.html"